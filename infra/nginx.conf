# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    root  /usr/share/nginx/html;
    index index.html;

    # Gzip all text-based assets
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css
        application/javascript application/json
        image/svg+xml application/wasm;

    # Vite hashes asset filenames — safe to cache forever
    location ~* \.(?:js|css|woff2|png|svg|ico|wasm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # REST API — forward to backend, no caching
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        add_header         Cache-Control     "no-store";
    }

    # WebSocket — must upgrade the connection; long timeout for live games
    location /ws {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # Health checks — forwarded directly, not cached
    location /health {
        proxy_pass http://backend:8080;
    }

    # SPA fallback — every unmatched path serves index.html so React handles routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
